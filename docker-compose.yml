version: "3.8"

services:

  postgres:
    image: postgres:15

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tasksdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/tasksdb

    depends_on:
      - postgres

volumes:
  postgres_data:
